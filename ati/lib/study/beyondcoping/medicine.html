<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>治疗 | Medicine | 超越应对</title><link rel="stylesheet" type="text/css" href="../../../../css/screen.css" /><link rel="stylesheet" type="text/css" href="../../../css/bilingual.css" /><script src="../../../js/mode-switch.js?v=2"></script></head><body><div class="mode-switch"><button href="../../../../../mirror_en/ati/lib/study/beyondcoping/medicine.html">EN 英文原文</button><button data-mode="zh">中文摘要</button></div><div id="H_content"><div class="zh" style="font-size:0.85em;color:#888;border-bottom:1px solid #ddd;padding-bottom:0.5em;">本页对应《超越应对》中关于治疗部分的中文摘要。完整英文原文请点击上方"EN 英文原文"按钮。</div><h1><span class="zh">治疗：佛法的解决方案</span></h1><div class="zh chapter"><p>治疗方法是佛陀的八正道：正见（理解四圣谛）、正思（思想中没有恶意）、正语（言语诚实）、正业（身体行为善巧）、正命（生计正当）、正精进（放弃不善巧品质）、正念（心的觉知）、正定（禅定）。通过这八个方面的修习，我们可以逐渐消除对苦难的执着，最终达到涅槃——完全超越所有痛苦的解脱。</p></div></div></body></html>
