<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>谨慎 | Heedfulness | 超越应对</title><link rel="stylesheet" type="text/css" href="../../../../css/screen.css" /><link rel="stylesheet" type="text/css" href="../../../css/bilingual.css" /><script src="../../../js/mode-switch.js?v=2"></script></head><body><div class="mode-switch"><button href="../../../../../mirror_en/ati/lib/study/beyondcoping/heedfulness.html">EN 英文原文</button><button data-mode="zh">中文摘要</button></div><div id="H_content"><div class="zh" style="font-size:0.85em;color:#888;border-bottom:1px solid #ddd;padding-bottom:0.5em;">本页对应《超越应对》中关于谨慎部分的中文摘要。完整英文原文请点击上方"EN 英文原文"按钮。</div><h1><span class="zh">谨慎：修行的要领</span></h1><div class="zh chapter"><p>谨慎（heedfulness）是面对人生痛苦时最重要的品质。它意味着清醒地意识到时间的流逝和生命的有限性，这激励我们不浪费时间在没有意义的事情上。谨慎帮助我们在面对衰老、疾病、死亡和分离时保持精神上的清醒和警觉。佛陀说谨慎是走向涅槃的不二法门——通过谨慎地修习八正道，我们必然会走向彻底的心灵解脱。</p></div></div></body></html>
