<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>建议 | Advice | 超越应对</title><link rel="stylesheet" type="text/css" href="../../../../css/screen.css" /><link rel="stylesheet" type="text/css" href="../../../css/bilingual.css" /><script src="../../../js/mode-switch.js?v=2"></script></head><body><div class="mode-switch"><button href="../../../../../mirror_en/ati/lib/study/beyondcoping/advice.html">EN 英文原文</button><button data-mode="zh">中文摘要</button></div><div id="H_content"><div class="zh" style="font-size:0.85em;color:#888;border-bottom:1px solid #ddd;padding-bottom:0.5em;">本页对应《超越应对》中关于建议部分的中文摘要。完整英文原文请点击上方"EN 英文原文"按钮。</div><h1><span class="zh">建议：实用的修行指导</span></h1><div class="zh chapter"><p>实践建议包括：面对衰老时，培养对无常的理解而非对青春的执着；面对疾病时，使用正念来观察身体而非抗拒痛苦；面对死亡时，修习念死以维持警觉和紧迫感；面对分离时，记住所有关系因缘聚合就会分离。关键是转变心的态度，而非改变外部环境。即使在痛苦中，心也能保持平静和清明。</p></div></div></body></html>
