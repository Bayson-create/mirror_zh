<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>诊断 | Diagnosis | 超越应对</title><link rel="stylesheet" type="text/css" href="../../../../css/screen.css" /><link rel="stylesheet" type="text/css" href="../../../css/bilingual.css" /><script src="../../../js/mode-switch.js?v=2"></script></head><body><div class="mode-switch"><button href="../../../../../mirror_en/ati/lib/study/beyondcoping/diagnosis.html">EN 英文原文</button><button data-mode="zh">中文摘要</button></div><div id="H_content"><div class="zh" style="font-size:0.85em;color:#888;border-bottom:1px solid #ddd;padding-bottom:0.5em;">本页对应《超越应对》中关于诊断部分的中文摘要。完整英文原文请点击上方"EN 英文原文"按钮。</div><h1><span class="zh">诊断：对苦的本质的认识</span></h1><div class="zh chapter"><p>诊断阶段涉及对人生四大痛苦的清晰认识：衰老带来身体能力的丧失，疾病导致身心痛苦，死亡是生命的必然结束，分离则是失去所爱之人的痛苦。佛陀教导这些不是偶然的痛苦，而是由于执着和渴爱而产生的。第一步是直视这些现实，不逃避，不否认。</p></div></div></body></html>
