<dt><a href="giftsheleft.html" id="giftsheleft">他留下的礼物：阿姜沙丘阿图洛的佛法遗产</a>, 
<span class="by">由 Phra Bodhinandamuni 编撰，由 Thanissaro Bhikkhu 翻译自泰文</span>

<dd>这是阿姜沙丘的一位长期出家同伴回忆的短篇轶事和引文集。阿姜沙丘直白的话语充满了看似简单的见解，反映出对佛法的深刻掌握。他对四圣谛的独特阐述，在这几页中回荡，清晰得令人惊叹：“心往外，是苦的集结；心往外的果，是苦；心见心，是道；心见心，果是苦的止息。” </dd>
